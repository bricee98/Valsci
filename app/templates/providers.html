<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Provider Catalog</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>
    <div class="container wide-container">
        <header class="page-header">
            <div>
                <h1>Providers and Models</h1>
                <p class="subtext">Manage provider snapshots and per-model pricing used by submission, reruns, and arenas.</p>
            </div>
            <div class="nav-links">
                <a href="/" class="nav-link">Home</a>
                <a href="/arena" class="nav-link">Arena</a>
                <a href="/browser" class="nav-link">Claims</a>
            </div>
        </header>

        <div class="grid-two providers-layout">
            <section class="panel">
                <h2>Catalog</h2>
                <div id="providerList"></div>
            </section>

            <section class="panel">
                <h2 id="editorTitle">New Provider</h2>
                <div class="form-row grid-two">
                    <div>
                        <label for="providerId">Provider ID</label>
                        <input type="text" id="providerId" placeholder="Optional; autogenerated when blank">
                    </div>
                    <div>
                        <label for="providerLabel">Label</label>
                        <input type="text" id="providerLabel" placeholder="Display label">
                    </div>
                </div>
                <div class="form-row grid-two">
                    <div>
                        <label for="providerType">Provider Type</label>
                        <select id="providerType">
                            <option value="openai">openai</option>
                            <option value="openrouter">openrouter</option>
                            <option value="local">local</option>
                            <option value="ollama">ollama</option>
                            <option value="llamacpp">llamacpp</option>
                            <option value="azure-openai">azure-openai</option>
                            <option value="azure-inference">azure-inference</option>
                        </select>
                    </div>
                    <div>
                        <label for="providerDefaultModel">Default Model</label>
                        <input type="text" id="providerDefaultModel" placeholder="e.g. gpt-4o">
                    </div>
                </div>
                <div class="form-row grid-two">
                    <div>
                        <label for="providerApiKey">API Key</label>
                        <input type="text" id="providerApiKey" placeholder="Stored in the repo-local catalog">
                    </div>
                    <div>
                        <label for="providerBaseUrl">Base URL</label>
                        <input type="text" id="providerBaseUrl" placeholder="Optional base URL">
                    </div>
                </div>
                <div class="form-row grid-two">
                    <div>
                        <label for="providerLocalBackend">Local Backend</label>
                        <select id="providerLocalBackend">
                            <option value="">None</option>
                            <option value="ollama">ollama</option>
                            <option value="llamacpp">llamacpp</option>
                        </select>
                    </div>
                    <div>
                        <label for="providerHttpReferer">HTTP Referer</label>
                        <input type="text" id="providerHttpReferer" placeholder="Optional OpenRouter referer">
                    </div>
                </div>
                <div class="form-row grid-two">
                    <div>
                        <label for="providerSiteName">Site Name</label>
                        <input type="text" id="providerSiteName" placeholder="Optional OpenRouter title">
                    </div>
                    <div>
                        <label for="providerAzureOpenAiApiVersion">Azure OpenAI API Version</label>
                        <input type="text" id="providerAzureOpenAiApiVersion" placeholder="2024-06-01">
                    </div>
                </div>
                <div class="form-row grid-two">
                    <div>
                        <label for="providerAzureOpenAiEndpoint">Azure OpenAI Endpoint</label>
                        <input type="text" id="providerAzureOpenAiEndpoint" placeholder="Optional Azure OpenAI endpoint">
                    </div>
                    <div>
                        <label for="providerAzureAiInferenceEndpoint">Azure AI Inference Endpoint</label>
                        <input type="text" id="providerAzureAiInferenceEndpoint" placeholder="Optional Azure AI Inference endpoint">
                    </div>
                </div>

                <h3>Task Defaults</h3>
                <div class="provider-task-grid">
                    <div class="form-row">
                        <label for="taskDefaultQueryGeneration">Query Generation</label>
                        <input type="text" id="taskDefaultQueryGeneration" placeholder="Optional task default">
                    </div>
                    <div class="form-row">
                        <label for="taskDefaultPaperAnalysis">Paper Analysis</label>
                        <input type="text" id="taskDefaultPaperAnalysis" placeholder="Optional task default">
                    </div>
                    <div class="form-row">
                        <label for="taskDefaultVenueScoring">Venue Scoring</label>
                        <input type="text" id="taskDefaultVenueScoring" placeholder="Optional task default">
                    </div>
                    <div class="form-row">
                        <label for="taskDefaultFinalReport">Final Report</label>
                        <input type="text" id="taskDefaultFinalReport" placeholder="Optional task default">
                    </div>
                </div>

                <div class="panel subtle-panel">
                    <div class="panel-header-row">
                        <h3>Models</h3>
                        <button type="button" id="addModelBtn" class="secondary-button small-button">Add Model</button>
                    </div>
                    <div id="modelRows"></div>
                </div>

                <div class="inline-actions">
                    <button type="button" id="saveProviderBtn" class="primary-button">Save Provider</button>
                    <button type="button" id="resetProviderBtn" class="secondary-button">Reset</button>
                </div>
            </section>
        </div>
    </div>

    <template id="modelRowTemplate">
        <article class="panel subtle-panel model-row">
            <div class="panel-header-row">
                <h4>Model</h4>
                <button type="button" class="danger-button small-button" data-remove-model>Remove</button>
            </div>
            <div class="provider-model-grid">
                <div class="form-row">
                    <label>Model Name</label>
                    <input type="text" data-model-field="model_name" placeholder="gpt-4o">
                </div>
                <div class="form-row">
                    <label>Label</label>
                    <input type="text" data-model-field="label" placeholder="Optional label">
                </div>
                <div class="form-row">
                    <label>Context Window</label>
                    <input type="number" data-model-field="context_window_tokens" min="1" value="8192">
                </div>
                <div class="form-row">
                    <label>Default Max Output</label>
                    <input type="number" data-model-field="max_output_tokens_default" min="1" value="1024">
                </div>
                <div class="form-row">
                    <label>Input / 1M Tokens</label>
                    <input type="number" data-model-field="input_cost_per_million" min="0" step="0.0001" value="0">
                </div>
                <div class="form-row">
                    <label>Output / 1M Tokens</label>
                    <input type="number" data-model-field="output_cost_per_million" min="0" step="0.0001" value="0">
                </div>
                <label class="checkbox-row">
                    <input type="checkbox" data-model-field="supports_temperature" checked>
                    <span>Supports temperature</span>
                </label>
                <label class="checkbox-row">
                    <input type="checkbox" data-model-field="supports_json_mode" checked>
                    <span>Supports JSON mode</span>
                </label>
            </div>
        </article>
    </template>

    <script>
        let selectedProviderId = null;

        function escapeHtml(value) {
            return String(value ?? '')
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        function taskDefaultsFromEditor() {
            const mapping = {
                query_generation: document.getElementById('taskDefaultQueryGeneration').value.trim(),
                paper_analysis: document.getElementById('taskDefaultPaperAnalysis').value.trim(),
                venue_scoring: document.getElementById('taskDefaultVenueScoring').value.trim(),
                final_report: document.getElementById('taskDefaultFinalReport').value.trim(),
            };
            Object.keys(mapping).forEach(key => {
                if (!mapping[key]) delete mapping[key];
            });
            return mapping;
        }

        function addModelRow(model = {}) {
            const template = document.getElementById('modelRowTemplate');
            const fragment = template.content.cloneNode(true);
            const row = fragment.querySelector('.model-row');
            row.querySelector('[data-model-field="model_name"]').value = model.model_name || '';
            row.querySelector('[data-model-field="label"]').value = model.label || '';
            row.querySelector('[data-model-field="context_window_tokens"]').value = model.context_window_tokens || 8192;
            row.querySelector('[data-model-field="max_output_tokens_default"]').value = model.max_output_tokens_default || 1024;
            row.querySelector('[data-model-field="input_cost_per_million"]').value = model.input_cost_per_million ?? 0;
            row.querySelector('[data-model-field="output_cost_per_million"]').value = model.output_cost_per_million ?? 0;
            row.querySelector('[data-model-field="supports_temperature"]').checked = model.supports_temperature ?? true;
            row.querySelector('[data-model-field="supports_json_mode"]').checked = model.supports_json_mode ?? true;
            document.getElementById('modelRows').appendChild(row);
        }

        function serializeModels() {
            return Array.from(document.querySelectorAll('.model-row')).map(row => ({
                model_name: row.querySelector('[data-model-field="model_name"]').value.trim(),
                label: row.querySelector('[data-model-field="label"]').value.trim() || row.querySelector('[data-model-field="model_name"]').value.trim(),
                context_window_tokens: parseInt(row.querySelector('[data-model-field="context_window_tokens"]').value || '8192', 10),
                max_output_tokens_default: parseInt(row.querySelector('[data-model-field="max_output_tokens_default"]').value || '1024', 10),
                input_cost_per_million: parseFloat(row.querySelector('[data-model-field="input_cost_per_million"]').value || '0'),
                output_cost_per_million: parseFloat(row.querySelector('[data-model-field="output_cost_per_million"]').value || '0'),
                supports_temperature: row.querySelector('[data-model-field="supports_temperature"]').checked,
                supports_json_mode: row.querySelector('[data-model-field="supports_json_mode"]').checked,
            })).filter(model => model.model_name);
        }

        function resetEditor() {
            selectedProviderId = null;
            document.getElementById('editorTitle').textContent = 'New Provider';
            document.getElementById('providerId').value = '';
            document.getElementById('providerLabel').value = '';
            document.getElementById('providerType').value = 'openai';
            document.getElementById('providerApiKey').value = '';
            document.getElementById('providerBaseUrl').value = '';
            document.getElementById('providerDefaultModel').value = '';
            document.getElementById('providerLocalBackend').value = '';
            document.getElementById('providerHttpReferer').value = '';
            document.getElementById('providerSiteName').value = '';
            document.getElementById('providerAzureOpenAiEndpoint').value = '';
            document.getElementById('providerAzureOpenAiApiVersion').value = '2024-06-01';
            document.getElementById('providerAzureAiInferenceEndpoint').value = '';
            document.getElementById('taskDefaultQueryGeneration').value = '';
            document.getElementById('taskDefaultPaperAnalysis').value = '';
            document.getElementById('taskDefaultVenueScoring').value = '';
            document.getElementById('taskDefaultFinalReport').value = '';
            document.getElementById('modelRows').innerHTML = '';
            addModelRow();
        }

        function populateEditor(provider) {
            selectedProviderId = provider.provider_id;
            document.getElementById('editorTitle').textContent = `Edit ${provider.label || provider.provider_id}`;
            document.getElementById('providerId').value = provider.provider_id || '';
            document.getElementById('providerLabel').value = provider.label || '';
            document.getElementById('providerType').value = provider.provider_type || 'openai';
            document.getElementById('providerApiKey').value = provider.api_key || '';
            document.getElementById('providerBaseUrl').value = provider.base_url || '';
            document.getElementById('providerDefaultModel').value = provider.default_model || '';
            document.getElementById('providerLocalBackend').value = provider.local_backend || '';
            document.getElementById('providerHttpReferer').value = provider.http_referer || '';
            document.getElementById('providerSiteName').value = provider.site_name || '';
            document.getElementById('providerAzureOpenAiEndpoint').value = provider.azure_openai_endpoint || '';
            document.getElementById('providerAzureOpenAiApiVersion').value = provider.azure_openai_api_version || '2024-06-01';
            document.getElementById('providerAzureAiInferenceEndpoint').value = provider.azure_ai_inference_endpoint || '';
            const taskDefaults = provider.task_defaults || {};
            document.getElementById('taskDefaultQueryGeneration').value = taskDefaults.query_generation || '';
            document.getElementById('taskDefaultPaperAnalysis').value = taskDefaults.paper_analysis || '';
            document.getElementById('taskDefaultVenueScoring').value = taskDefaults.venue_scoring || '';
            document.getElementById('taskDefaultFinalReport').value = taskDefaults.final_report || '';
            document.getElementById('modelRows').innerHTML = '';
            (provider.models || []).forEach(addModelRow);
            if (!(provider.models || []).length) addModelRow();
        }

        async function loadProviders() {
            const response = await fetch('/api/v1/providers');
            const data = await response.json();
            if (!response.ok) throw new Error(data.error || 'Failed to load providers.');

            document.getElementById('providerList').innerHTML = data.providers.map(provider => `
                <article class="panel subtle-panel">
                    <h3>${escapeHtml(provider.label || provider.provider_id)}</h3>
                    <p><strong>Type:</strong> ${escapeHtml(provider.provider_type)}</p>
                    <p><strong>Default model:</strong> ${escapeHtml(provider.default_model || '')}</p>
                    <p><strong>Task defaults:</strong> ${escapeHtml(Object.entries(provider.task_defaults || {}).map(([task, model]) => `${task}: ${model}`).join(' | ') || 'none')}</p>
                    <p><strong>Models:</strong> ${(provider.models || []).length}</p>
                    <div class="inline-actions">
                        <button type="button" class="secondary-button small-button" data-edit="${escapeHtml(provider.provider_id)}">Edit</button>
                        <button type="button" class="danger-button small-button" data-delete="${escapeHtml(provider.provider_id)}">Delete</button>
                    </div>
                </article>
            `).join('') || '<div class="helper-text">No providers configured.</div>';

            document.querySelectorAll('[data-edit]').forEach(button => {
                button.addEventListener('click', () => {
                    const provider = data.providers.find(item => item.provider_id === button.dataset.edit);
                    if (provider) populateEditor(provider);
                });
            });
            document.querySelectorAll('[data-delete]').forEach(button => {
                button.addEventListener('click', () => deleteProvider(button.dataset.delete));
            });
        }

        async function saveProvider() {
            const payload = {
                provider_id: document.getElementById('providerId').value.trim() || undefined,
                label: document.getElementById('providerLabel').value.trim(),
                provider_type: document.getElementById('providerType').value,
                api_key: document.getElementById('providerApiKey').value,
                base_url: document.getElementById('providerBaseUrl').value.trim(),
                default_model: document.getElementById('providerDefaultModel').value.trim(),
                local_backend: document.getElementById('providerLocalBackend').value,
                http_referer: document.getElementById('providerHttpReferer').value.trim(),
                site_name: document.getElementById('providerSiteName').value.trim(),
                azure_openai_endpoint: document.getElementById('providerAzureOpenAiEndpoint').value.trim(),
                azure_openai_api_version: document.getElementById('providerAzureOpenAiApiVersion').value.trim() || '2024-06-01',
                azure_ai_inference_endpoint: document.getElementById('providerAzureAiInferenceEndpoint').value.trim(),
                task_defaults: taskDefaultsFromEditor(),
                models: serializeModels(),
            };
            const method = selectedProviderId ? 'PUT' : 'POST';
            const url = selectedProviderId ? `/api/v1/providers/${encodeURIComponent(selectedProviderId)}` : '/api/v1/providers';
            const response = await fetch(url, {
                method,
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload),
            });
            const data = await response.json();
            if (!response.ok) throw new Error(data.error || 'Failed to save provider.');
            resetEditor();
            await loadProviders();
        }

        async function deleteProvider(providerId) {
            if (!confirm('Delete this provider snapshot?')) return;
            const response = await fetch(`/api/v1/providers/${encodeURIComponent(providerId)}`, { method: 'DELETE' });
            const data = await response.json();
            if (!response.ok) throw new Error(data.error || 'Failed to delete provider.');
            if (selectedProviderId === providerId) resetEditor();
            await loadProviders();
        }

        document.getElementById('addModelBtn').addEventListener('click', () => addModelRow());
        document.getElementById('modelRows').addEventListener('click', (event) => {
            if (!event.target.closest('[data-remove-model]')) return;
            event.target.closest('.model-row').remove();
            if (!document.querySelector('.model-row')) addModelRow();
        });
        document.getElementById('saveProviderBtn').addEventListener('click', () => saveProvider().catch(error => alert(error.message)));
        document.getElementById('resetProviderBtn').addEventListener('click', resetEditor);

        resetEditor();
        loadProviders().catch(error => {
            document.getElementById('providerList').innerHTML = `<div class="error-message">${escapeHtml(error.message)}</div>`;
        });
    </script>
</body>
</html>
