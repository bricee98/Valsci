<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arena Results</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>
    <div class="container wide-container">
        <header class="page-header">
            <div>
                <h1>Arena Results</h1>
                <p class="subtext">Side-by-side rating, cost, and settings review.</p>
            </div>
            <div class="nav-links">
                <a href="/arena" class="nav-link">New Arena</a>
                <a href="/browser" class="nav-link">Claims</a>
            </div>
        </header>
        <div id="arenaMeta" class="panel"></div>
        <div id="arenaClaims"></div>
    </div>

    <script>
        const arenaId = '{{ arena_id }}';

        function escapeHtml(value) {
            return String(value ?? '')
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        function reportHref(run) {
            if (!run.transport_batch_id || !run.transport_claim_id) return '#';
            return run.report_available
                ? `/results?batch_id=${encodeURIComponent(run.transport_batch_id)}&claim_id=${encodeURIComponent(run.transport_claim_id)}`
                : `/progress?batch_id=${encodeURIComponent(run.transport_batch_id)}&claim_id=${encodeURIComponent(run.transport_claim_id)}`;
        }

        function modelSummary(run) {
            const taskModels = ((run.effective_models || {}).task_models || {});
            return Object.entries(taskModels)
                .map(([task, model]) => `${task}: ${model}`)
                .join(' | ');
        }

        async function loadArena() {
            const response = await fetch(`/api/v1/arenas/${encodeURIComponent(arenaId)}`);
            const data = await response.json();
            if (!response.ok) throw new Error(data.error || 'Failed to load arena.');

            document.getElementById('arenaMeta').innerHTML = `
                <h2>${escapeHtml(data.title || data.arena_id)}</h2>
                <p><strong>Execution mode:</strong> ${escapeHtml(data.execution_mode)}</p>
                <p><strong>Candidates:</strong> ${data.candidates.length}</p>
                <p><strong>Claims:</strong> ${data.claim_groups.length}</p>
                <p><strong>Batch tags:</strong> ${escapeHtml((data.batch_tags || []).join(', ') || 'none')}</p>
            `;

            const claimsHtml = data.claim_groups.map(group => `
                <section class="panel">
                    <h2>${escapeHtml(group.text)}</h2>
                    <div class="comparison-grid">
                        ${group.runs.map(run => `
                            <article class="comparison-card">
                                <h3>${escapeHtml(run.provider_label || run.provider_type || run.default_model || run.run_id)}</h3>
                                <p><strong>Status:</strong> ${escapeHtml(run.status)}</p>
                                <p><strong>Rating:</strong> ${escapeHtml(run.rating_label)}${run.claimRating !== null && run.claimRating !== undefined ? ` (${run.claimRating})` : ''}</p>
                                <p><strong>Execution:</strong> ${escapeHtml(run.execution_mode)}</p>
                                <p><strong>Expected Cost:</strong> $${(((run.cost_estimate || {}).expected || {}).cost_usd || 0).toFixed(4)}</p>
                                <p><strong>Actual Cost:</strong> $${((run.usage || {}).cost_usd || 0).toFixed(4)}</p>
                                <p><strong>Issues:</strong> ${run.issues_count || 0}</p>
                                <p><strong>Models:</strong> ${escapeHtml(modelSummary(run) || 'provider defaults')}</p>
                                <p><strong>Search:</strong> ${escapeHtml(JSON.stringify(run.search_config || {}))}</p>
                                <p><strong>Batch Tags:</strong> ${escapeHtml((run.batch_tags || []).join(', ') || 'none')}</p>
                                <p><a href="${reportHref(run)}">${run.report_available ? 'Open report' : 'Open progress'}</a></p>
                                <p><a href="/claims/${encodeURIComponent(group.claim_key)}">Claim detail</a></p>
                            </article>
                        `).join('')}
                    </div>
                </section>
            `).join('');

            document.getElementById('arenaClaims').innerHTML = claimsHtml || '<div class="panel">No arena results found.</div>';
        }

        loadArena().catch(error => {
            document.getElementById('arenaClaims').innerHTML = `<div class="panel error-message">${escapeHtml(error.message)}</div>`;
        });
    </script>
</body>
</html>
