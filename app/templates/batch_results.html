<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Batch Results</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
    <link href="https://unpkg.com/tabulator-tables@5.5.0/dist/css/tabulator.min.css" rel="stylesheet">
    <script type="text/javascript" src="https://unpkg.com/tabulator-tables@5.5.0/dist/js/tabulator.min.js"></script>
    <style>
        .trace-box {
            margin: 0 0 16px 0;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            background: #fafafa;
        }
    </style>
</head>
<body>
    <div class="batch-results-container wide-container">
        <h1>Batch Results</h1>
        <div id="batchStatusBanner"></div>
        <div class="actions-bar">
            <button id="deleteBatchButton" class="danger-button">Delete Batch</button>
            <button id="downloadCSV" class="primary-button">Download CSV</button>
            <button id="downloadMarkdown" class="primary-button">Bulk Download Reports</button>
            <input type="text" id="filter-input" placeholder="Filter results..." class="filter-input">
        </div>
        
        <div id="resultsTable"></div>
        <div id="totalPrice" class="total-price"></div>
    </div>

    <script>
        const batchId = '{{ batch_id }}';
        let table;
        let refreshTimer = null;
        const batchStatusBanner = document.getElementById('batchStatusBanner');

        const columns = [
            {
                title: "Claim", 
                field: "text", 
                sorter: "string", 
                headerFilter: true, 
                formatter: "textarea",
                widthGrow: 3
            },
            {
                title: "Status", 
                field: "status", 
                sorter: "string", 
                headerFilter: true, 
                widthGrow: 1
            },
            {
                title: "Location",
                field: "claim_location",
                sorter: "string",
                headerFilter: true,
                widthGrow: 1
            },
            {
                title: "Rating", 
                field: "claimRating", 
                sorter: "number", 
                headerFilter: true, 
                widthGrow: 1,
                formatter: function(cell) {
                    const value = cell.getValue();
                    return value === null || value === undefined ? 'N/A' : value;
                }
            },
            {
                title: "Supporting", 
                field: "supporting_papers_count", 
                sorter: "number", 
                headerFilter: true, 
                widthGrow: 1
            },
            {
                title: "Non-Relevant", 
                field: "non_relevant_papers_count", 
                sorter: "number", 
                headerFilter: true, 
                widthGrow: 1
            },
            {
                title: "Price", 
                field: "price", 
                sorter: "number",
                widthGrow: 1,
                formatter: function(cell) {
                    const value = cell.getValue();
                    return value ? `$${value.toFixed(4)}` : 'N/A';
                }
            },
            {
                title: "Report",
                field: "report",
                widthGrow: 1,
                formatter: function(cell) {
                    const row = cell.getRow().getData();
                    const claim_id = row.claim_id;
                    if (row.report_available && row.claim_location === 'saved_jobs') {
                        return `<a href="/results?claim_id=${claim_id}&batch_id=${batchId}" class="report-link">View Report</a>`;
                    }
                    return `<a href="/progress?claim_id=${claim_id}&batch_id=${batchId}" class="report-link">View Progress</a>`;
                },
                headerSort: false
            }
        ];

        function renderBatchBanner(data) {
            const statusText = data.has_partial_resume
                ? 'This batch is processing again after one or more claims were resumed.'
                : data.status === 'completed'
                    ? 'This batch is completed.'
                    : 'This batch is still processing.';
            const savedCount = data.counts_by_location?.saved_jobs || 0;
            const queuedCount = data.counts_by_location?.queued_jobs || 0;
            batchStatusBanner.innerHTML = `
                <div class="trace-box">
                    <p><strong>Status:</strong> ${data.status}</p>
                    <p><strong>Claims:</strong> ${data.processed_claims} completed out of ${data.total_claims}</p>
                    <p><strong>Saved / Queued:</strong> ${savedCount} / ${queuedCount}</p>
                    <p>${statusText}</p>
                </div>
            `;
        }

        function initializeTable(data) {
            const tableData = data.claims.map(claim => {
                const report = claim.report || {};
                
                if (claim.report_available && claim.claim_location === 'saved_jobs') {
                    return {
                        text: claim.text || 'N/A',
                        status: claim.status,
                        claim_location: claim.claim_location || 'saved_jobs',
                        claimRating: report.claimRating !== undefined && report.claimRating !== null ? report.claimRating : null,
                        supporting_papers_count: report.relevantPapers?.length || 0,
                        non_relevant_papers_count: report.nonRelevantPapers?.length || 0,
                        price: report.usage_summary?.cost_usd || report.usage_stats?.cost_usd || report.usage_stats?.total_cost || 0,
                        claim_id: claim.claim_id,
                        report_available: true
                    };
                }

                return {
                    text: claim.text || 'N/A',
                    status: claim.status || 'Error',
                    claim_location: claim.claim_location || 'unknown',
                    claimRating: null,
                    supporting_papers_count: 0,
                    non_relevant_papers_count: 0,
                    price: 0,
                    claim_id: claim.claim_id,
                    report_available: false
                };
            });

            if (table) {
                table.setData(tableData);
            } else {
                table = new Tabulator("#resultsTable", {
                    data: tableData,
                    layout: "fitColumns",
                    responsiveLayout: true,
                    pagination: "local",
                    paginationSize: 25,
                    paginationSizeSelector: [10, 25, 50, 100],
                    columns: columns,
                    initialSort: [
                        {column: "claimRating", dir: "desc"}
                    ],
                    rowHeight: 100,
                    textWrapping: true,
                    width: "100%"
                });
            }

            const totalPrice = tableData.reduce((sum, row) => sum + (row.price || 0), 0);
            document.getElementById('totalPrice').innerHTML = 
                `<h3>Total Batch Price: $${totalPrice.toFixed(4)}</h3>`;
            renderBatchBanner(data);
            document.getElementById('downloadMarkdown').disabled = data.status !== 'completed';
        }

        function loadBatchResults() {
            fetch(`/api/v1/batch/${batchId}`)
                .then(response => response.json())
                .then(data => {
                    initializeTable(data);
                    if (refreshTimer) {
                        clearTimeout(refreshTimer);
                        refreshTimer = null;
                    }
                    if (data.status !== 'completed') {
                        refreshTimer = setTimeout(loadBatchResults, 5000);
                    }
                })
                .catch(error => {
                    console.error('Error fetching batch results:', error);
                    document.getElementById('resultsTable').innerHTML = 
                        '<div class="error-message">Error fetching batch results. Please try again later.</div>';
                });
        }

        loadBatchResults();

        // Download CSV handler
        document.getElementById('downloadCSV').addEventListener('click', function() {
            table.download("csv", `batch_results_${batchId}.csv`);
        });

        // Delete batch handler
        document.getElementById('deleteBatchButton').addEventListener('click', function() {
            if (confirm('Are you sure you want to delete this batch?')) {
                fetch(`/api/v1/delete/batch/${batchId}`, { method: 'DELETE' })
                    .then(response => response.json())
                    .then(data => {
                        alert(data.message);
                        window.location.href = '/browser';
                    })
                    .catch(error => {
                        console.error('Error deleting batch:', error);
                        alert('Error deleting batch. Please try again.');
                    });
            }
        });

        // Filter input handler
        document.getElementById('filter-input').addEventListener('keyup', function(e) {
            table.setFilter("text", "like", e.target.value);
        });

        // Add a click handler for Bulk Download Markdown
        document.getElementById('downloadMarkdown').addEventListener('click', function() {
            fetch(`/api/v1/batch/${batchId}/download_markdown`)
                .then(async response => {
                    if (!response.ok) {
                        const payload = await response.json();
                        throw new Error(payload.error || 'Failed to download markdown reports.');
                    }
                    return response.blob();
                })
                .then(blob => {
                    const url = URL.createObjectURL(blob);
                    const link = document.createElement('a');
                    link.href = url;
                    link.download = `batch_${batchId}_reports.zip`;
                    document.body.appendChild(link);
                    link.click();
                    link.remove();
                    URL.revokeObjectURL(url);
                })
                .catch(error => {
                    alert(error.message || 'Failed to download markdown reports.');
                });
        });
    </script>
</body>
</html>
